model:
  default: "MiniMax-M1"
  provider: "minimax"
  max_tokens: 8192

terminal:
  backend: "local"
  cwd: "."
  timeout: 180

tools:
  enabled_toolsets:
    - core
    - web
    - terminal
    - expense_tracker
  disabled_tools: []

memory:
  mode: "local"

platforms:
  telegram:
    enabled: true
  webhook:
    enabled: true
    port: 8644

display:
  skin: "default"
