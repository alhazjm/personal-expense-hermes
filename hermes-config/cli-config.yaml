model:
  default: "MiniMax-M1"
  provider: "minimax"
  max_tokens: 8192

terminal:
  backend: "local"
  cwd: "."
  timeout: 180

tools:
  enabled_toolsets:
    - core
    - web
    - terminal
    - expense_tracker
  disabled_tools: []

memory:
  mode: "local"

gateway:
  platforms:
    - name: "telegram"
      enabled: true
      home_channel:
        chat_id: "${TELEGRAM_ALLOWED_USER_IDS}"
        name: "Home"
    - name: "webhook"
      enabled: true
      port: 8644
      hmac_secret: "${WEBHOOK_HMAC_SECRET}"

display:
  skin: "default"
